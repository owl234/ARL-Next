version: '3'

volumes:
  arl_db_test:
  arl_redis_test:
  # 👇 新增：用于隔离和持久化系统运行产生的动态数据
  arl_tmp_test:          # 存放报表等临时文件
  arl_screenshot_test:   # 存放截图文件
  arl_upload_poc_test:   # 存放用户上传的 POC:

services:
  # 🚀 1. 前端 Nginx
  frontend:
    # ⚠️ 确保这里的镜像名与您在 CI 中推送到 GHCR 的保持一致
    image: ghcr.io/owl234/arl-frontend:latest
    container_name: arl_frontend_test
    restart: always
    ports:
      - "80:80" # 根据实际测试环境端口配置
    depends_on:
      - backend

  # ⚙️ 2. 后端 Web API
  backend:
    image: ghcr.io/owl234/arl-backend:latest
    container_name: arl_backend_test
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mongodb
      - redis
    volumes:
      # ✅ 保留并隔离动态数据目录 (使用上方定义的 named volumes)
      - arl_upload_poc_test:/opt/ARL-NPoC/xing/plugins/upload_poc
      - arl_tmp_test:/code/tmp
      - arl_screenshot_test:/code/tmp_screenshot

      # ✅ 保留外部数据依赖和配置
      - ./backend/GeoLite2:/data/GeoLite2
      # 将本地安全初始化后的脱敏配置文件，以只读(ro)方式挂载进去
      - ./backend/config-docker.yaml:/code/config.yaml:ro
    entrypoint: ["sh", "-c", "sh /usr/bin/wait-for-it.sh mongodb:27017; sh /usr/bin/wait-for-it.sh redis:6379; gunicorn -b 0.0.0.0:5000 app.main:arl_app -w 2" ]

  # 👷 3. 核心扫描节点
  worker:
    image: ghcr.io/owl234/arl-backend:latest
    container_name: arl_worker_test
    restart: always
    depends_on:
      - mongodb
      - redis
    volumes:
      # Worker 也需要相同的动态数据卷
      - arl_upload_poc_test:/opt/ARL-NPoC/xing/plugins/upload_poc
      - arl_tmp_test:/code/tmp
      - arl_screenshot_test:/code/tmp_screenshot
      - ./backend/GeoLite2:/data/GeoLite2
      - ./backend/config-docker.yaml:/code/config.yaml:ro
    entrypoint: ["sh", "-c", "sh /usr/bin/wait-for-it.sh mongodb:27017; sh /usr/bin/wait-for-it.sh redis:6379; celery -A app.celerytask.celery worker -Q arltask -n arltask -c 2 -O fair -l info"]

  # 🕵️ 4. GitHub 监控节点
  worker-github:
    image: ghcr.io/owl234/arl-backend:latest
    container_name: arl_worker_github_test
    restart: always
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/GeoLite2:/data/GeoLite2
      - ./backend/config-docker.yaml:/code/app/config.yaml:ro
    entrypoint: ["sh", "-c", "wait-for-it.sh mongodb:27017; wait-for-it.sh redis:6379; celery -A app.celerytask.celery worker -Q github -n github -c 2"]

  # ⏱️ 5. 定时调度器
  scheduler:
    image: ghcr.io/owl234/arl-backend:latest
    container_name: arl_scheduler_test
    restart: always
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/GeoLite2:/data/GeoLite2
      - ./backend/config-docker.yaml:/code/config.yaml:ro
    entrypoint: ["sh", "-c", "wait-for-it.sh mongodb:27017; wait-for-it.sh redis:6379; python3 -m app.scheduler"]

  # 🗄️ 6. 数据库 (与 local 保持一致，保留初始密码)
  mongodb:
    image: mongo:4.0.27
    container_name: arl_mongodb_test
    restart: always
    volumes:
      - "arl_db_test:/data/db"
      - "./init-mongo-account.js:/docker-entrypoint-initdb.d/init-mongo-account.js:ro"
    # 👇 把底层数据库的环境变量加回来
    environment:
      - MONGO_INITDB_DATABASE=arl
      - MONGO_INITDB_ROOT_USERNAME=admin
      # 👇 新增：自动读取 .env 中的强密码变量
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}

  # 🔴 7. 消息队列 (Redis)
  redis:
    image: redis:alpine
    container_name: arl_redis_test
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - arl_redis_test:/data
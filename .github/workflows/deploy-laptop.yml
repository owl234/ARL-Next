name: Deploy ARL to Laptop VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, laptop]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🔧 Prepare Scripts
        run: |
          sed -i 's/\r$//' backend/wait-for-it.sh
          chmod +x backend/wait-for-it.sh

      # 🚀 新增：环境自动装甲兵！
      - name: ⚙️ Check and Install Docker Compose
        run: |
          # 检查是否安装了带空格的 docker compose 或带横杠的 docker-compose
          if ! docker compose version &> /dev/null && ! command -v docker-compose &> /dev/null; then
            echo "⚠️ 检测到未安装 Docker Compose，开始全自动安装..."
            sudo apt-get update
            # -y 参数很重要，防止安装过程中跳出 [Y/n] 提示导致流水线卡死
            sudo apt-get install -y docker-compose-plugin
            echo "✅ Docker Compose 安装完成！"
          else
            echo "✅ 环境检测通过：Docker Compose 已就绪。"
          fi

      - name: 🚀 Build and Deploy via Docker Compose
        run: |
          # 统一使用现代化语法：docker compose (无横杠)
          docker compose -f docker-compose.local.yml down || true
          docker compose -f docker-compose.local.yml up -d --build
          docker image prune -f